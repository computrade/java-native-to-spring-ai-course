plugins {
    id 'org.springframework.boot' version '4.1.0' apply false
    id 'io.spring.dependency-management' version '1.1.7'
    id 'java'
}

allprojects {
    group = 'com.computrade'
    version = '1.0.0'

    repositories {
        mavenCentral()
    }
}

subprojects {
    apply plugin: 'java'
    apply plugin: 'org.springframework.boot'
    apply plugin: 'io.spring.dependency-management'

    java {
        toolchain {
            languageVersion = JavaLanguageVersion.of(25)
        }
    }

    ext {
        set('springAiVersion', "2.0.0")
    }

    dependencies {
        implementation platform("org.springframework.ai:spring-ai-bom:${springAiVersion}")
        implementation 'org.springframework.boot:spring-boot-starter-webmvc'
        implementation 'org.springframework.boot:spring-boot-starter-validation'
        implementation 'org.springframework.ai:spring-ai-starter-vector-store-pgvector'
        implementation 'org.springdoc:springdoc-openapi-starter-webmvc-ui:2.8.5'
        compileOnly 'org.projectlombok:lombok'
        annotationProcessor 'org.projectlombok:lombok'
        testImplementation 'org.springframework.boot:spring-boot-starter-webmvc-test'
        testCompileOnly 'org.projectlombok:lombok'
        testRuntimeOnly 'org.junit.platform:junit-platform-launcher'
        testAnnotationProcessor 'org.projectlombok:lombok'

        // Driver for PostgreSQL database
        implementation 'org.springframework.boot:spring-boot-starter-jdbc'
        runtimeOnly 'org.postgresql:postgresql'
    }

    tasks.named('test') {
        useJUnitPlatform()
    }

    tasks.named('bootRun') {
        if (project.hasProperty('geminiApiKey')) {
            environment 'GEMINI_API_KEY', project.property('geminiApiKey')
        }

        if (project.hasProperty('openaiApiKey')) {
            environment 'OPENAI_API_KEY', project.property('openaiApiKey')
        }

        if (project.hasProperty('anthropicApiKey')) {
            environment 'ANTHROPIC_API_KEY', project.property('anthropicApiKey')
        }
    }

}